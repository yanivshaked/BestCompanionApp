const RTL_LANGS = ['he', 'ar'];
const LANG_ORDER = ['en','es','fr','de','it','pt','ru','ja','ko','zh','ar','he','hi','tr','nl','pl','sv','da','no','fi'];

function detectLanguage() {
  const saved = localStorage.getItem('bestcompanion_lang');
  if (saved && T[saved]) return saved;
  const nav = (navigator.language || '').substring(0, 2).toLowerCase();
  return T[nav] ? nav : 'en';
}

function setLanguage(lang) {
  if (!T[lang]) lang = 'en';
  localStorage.setItem('bestcompanion_lang', lang);
  const strings = T[lang];

  // Set text direction
  const dir = strings._dir || 'ltr';
  document.documentElement.setAttribute('dir', dir);
  document.documentElement.setAttribute('lang', lang);

  // Update all translatable elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key]) {
      el.textContent = strings[key];
    }
  });

  // Update dropdown
  document.getElementById('langSelect').value = lang;
}

// Populate language dropdown
const select = document.getElementById('langSelect');
LANG_ORDER.forEach(code => {
  const opt = document.createElement('option');
  opt.value = code;
  opt.textContent = T[code]._name;
  select.appendChild(opt);
});

// Initialize
setLanguage(detectLanguage());
</script>
